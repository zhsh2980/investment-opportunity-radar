<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}投资机会雷达{% endblock %}</title>
    <meta name="description" content="投资机会雷达 - 智能分析公众号文章中的投资机会">
    <script>
        // 防闪烁:尽早应用深色主题
        try { if (localStorage.getItem('radar-theme') === 'dark') document.documentElement.dataset.theme = 'dark'; } catch (e) { }
    </script>
    <link rel="stylesheet" href="/static/aurora.css?v=1">
    <script src="/static/aurora.js?v=1" defer></script>
    {% block extra_head %}{% endblock %}
</head>

<body>
    {% if user %}
    <div class="app-shell">
        <!-- 侧边导航 -->
        <aside class="ds-sidenav">
            <div class="ds-sidenav-brand">
                <div class="ds-sidenav-logo">◎</div>
                <div class="ds-sidenav-name">投资机会雷达</div>
            </div>
            <nav class="ds-sidenav-items">
                <div class="ds-sidenav-group">工作区</div>
                <a href="/" class="ds-sidenav-item {% if request.url.path == '/' %}active{% endif %}">
                    <svg class="ds-sidenav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    <span>今日工作台</span>
                    {% if pending_count %}<span class="ds-badge">{{ pending_count }}</span>{% endif %}
                </a>
                <a href="/tracking" class="ds-sidenav-item {% if request.url.path == '/tracking' %}active{% endif %}">
                    <svg class="ds-sidenav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/></svg>
                    <span>跟踪台</span>
                </a>
                <a href="/history" class="ds-sidenav-item {% if request.url.path == '/history' %}active{% endif %}">
                    <svg class="ds-sidenav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
                    <span>历史与搜索</span>
                </a>
                <div class="ds-sidenav-group">系统</div>
                <a href="/system" class="ds-sidenav-item {% if request.url.path == '/system' %}active{% endif %}">
                    <svg class="ds-sidenav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 17h16"/><circle cx="9" cy="7" r="2.5"/><circle cx="15" cy="17" r="2.5"/></svg>
                    <span>系统设置</span>
                </a>
            </nav>
            <div class="ds-sidenav-footer">
                <span>{{ user.username }}</span>
                <form action="/api/auth/logout" method="POST" style="margin-left:auto">
                    <button type="submit" class="ds-btn ds-btn-ghost ds-btn-sm">退出</button>
                </form>
            </div>
        </aside>

        <!-- 主区 -->
        <div class="app-main">
            <header class="app-topbar">
                <div class="app-search">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
                    <input type="text" placeholder="搜索机会、公众号、关键词…"
                           onkeydown="if(event.key==='Enter'){location.href='/history?keyword='+encodeURIComponent(this.value)}">
                </div>
                <div class="app-topbar-spacer"></div>
                <button class="ds-btn ds-btn-ghost ds-btn-icononly" onclick="toggleTheme()" title="切换深色模式">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
                </button>
            </header>
            <main class="app-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    {% else %}
    {% block guest_content %}{% endblock %}
    {% endif %}

    {% block extra_scripts %}{% endblock %}
</body>

</html>
